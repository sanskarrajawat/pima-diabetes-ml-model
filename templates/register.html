<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#dbeafe,#eef2ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

h2{
color:#1e3a8a;
}

input{
width:95%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1e3a8a;
color:white;
padding:10px 25px;
border:none;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.login{
margin-top:15px;
}

.login a{
text-decoration:none;
color:#1e3a8a;
}

</style>
</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="POST">

<input name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<div class="login">

Already have account?

<a href="/login">Login</a>

</div>

</div>

</body>
</html>
