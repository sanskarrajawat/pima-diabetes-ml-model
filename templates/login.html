<!DOCTYPE html>
<html>
<head>
<title>Login - Diabetes Prediction</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(135deg,#dbeafe,#eef2ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* LOGIN BOX */

.box{
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    width:320px;
    text-align:center;
}

h2{
    color:#1e3a8a;
    margin-bottom:20px;
}

/* INPUT */

input, select{
    width:95%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BUTTON */

button{
    background:#1e3a8a;
    color:white;
    padding:10px 25px;
    border:none;
    border-radius:6px;
    margin-top:15px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

/* LINKS */

.links{
    margin-top:15px;
}

.links a{
    text-decoration:none;
    color:#1e3a8a;
    font-size:14px;
    display:block;
    margin-top:6px;
}

</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

<select name="role" required>
<option value="user">User Login</option>
<option value="admin">Admin Login</option>
</select>

<input name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="links">

<a href="/register">New user? Create Account</a>

<a href="/">← Back to Home</a>

</div>

</div>

</body>
</html>
